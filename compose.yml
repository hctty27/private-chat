services:
  # 前端容器：Nginx + Vue静态文件
  frontend:
    build: ./frontend
    container_name: private-chat-frontend
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    networks:
      - my-network

  # Go 后端
  backend:
    build: ./backend
    container_name: private-chat-backend
    restart: unless-stopped
    networks:
      - my-network
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - LISTEN_ADDR=${LISTEN_ADDR:-:8080}
      - POSTGRES_HOST=${POSTGRES_HOST:?missing POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:?missing POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?missing POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:?missing POSTGRES_DB}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE:-require}
      - REDIS_ADDR=${REDIS_ADDR:-redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?missing REDIS_PASSWORD}
      - R2_ENDPOINT=${R2_ENDPOINT:?missing R2_ENDPOINT}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY:?missing R2_ACCESS_KEY}
      - R2_SECRET_KEY=${R2_SECRET_KEY:?missing R2_SECRET_KEY}
      - R2_BUCKET=${R2_BUCKET:?missing R2_BUCKET}
      - R2_OBJECT_PREFIX=${R2_OBJECT_PREFIX:-}
      - JWT_SECRET=${JWT_SECRET:?missing JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-24h}

networks:
  my-network:
    external: true
